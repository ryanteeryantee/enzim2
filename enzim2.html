<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi Cara Kerja Enzim - Biologidaebak</title>

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e3f2fd, #f3e5f5);
            color: #333;
        }

        .simulasi-enzim {
            width: 100%;
            max-width: 1100px;
            margin: auto;
            background: white;
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* Gaya Khusus saat Mode Fullscreen Aktif */
        .simulasi-enzim:fullscreen {
            max-width: 100%;
            width: 100%;
            height: 100vh;
            border-radius: 0;
            padding: 40px;
            overflow-y: auto;
            background: linear-gradient(135deg, #e3f2fd, #f3e5f5);
        }

        /* HEADER */
        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            margin: 0;
            color: #17479e;
            font-size: 32px;
        }

        .header p {
            color: #4a5a77;
            margin-top: 10px;
            font-size: 18px;
            margin-bottom: 20px;
        }

        /* Gaya Khusus Tombol Atas */
        .top-action-box {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
        }

        .btn-top {
            width: auto;
            min-width: 250px;
            padding: 14px 30px;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(0, 188, 212, 0.3);
        }

        /* LAYOUT */
        .layout {
            display: grid;
            grid-template-columns: 240px 1fr 240px;
            gap: 20px;
        }

        /* PANEL */
        .panel {
            background: #f8fbff;
            border: 2px solid #dbe7ff;
            border-radius: 18px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .panel h3 {
            margin-top: 0;
            color: #1d3f8f;
            font-size: 18px;
            border-bottom: 1px solid #dbe7ff;
            padding-bottom: 8px;
        }

        /* TOMBOL */
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn:active { transform: scale(0.98); }
        .enzim { background: #8e5cf7; }
        .substrat { background: #ff9800; }
        .mulai { background: #4caf50; }
        .fullscreen { background: #00bcd4; } 
        .reset { background: #8a9aad; }

        /* BEAKER (GELAS KIMIA) */
        .canvas-box {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .beaker {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 500px;
            border: 8px solid #8ea1b5;
            border-top: none;
            border-radius: 0 0 50px 50px;
            background: linear-gradient(to top, #e7f3ff, #ffffff);
            overflow: hidden;
            box-shadow: inset 0 -20px 30px rgba(0,0,0,0.05);
        }

        .beaker::before {
            content: "";
            position: absolute;
            top: -25px;
            left: -10%;
            width: 120%;
            height: 50px;
            border: 8px solid #8ea1b5;
            border-radius: 50%;
            background: #f8fbff;
            z-index: 10;
        }

        .liquid {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 80%;
            background: rgba(173, 216, 255, 0.4);
            transition: background 0.5s ease;
        }

        .scale {
            position: absolute;
            right: 20px;
            color: #8ea1b5;
            font-size: 18px;
            font-weight: bold;
            opacity: 0.6;
            user-select: none;
        }
        .scale1 { top: 120px; }
        .scale2 { top: 240px; }
        .scale3 { top: 360px; }

        /* MOLEKUL & ANIMASI */
        .molecule {
            position: absolute;
            border-radius: 50%;
            z-index: 5;
            transition: left 1.5s cubic-bezier(0.45, 0.05, 0.55, 0.95), 
                        top 1.5s cubic-bezier(0.45, 0.05, 0.55, 0.95), 
                        background 0.5s ease, filter 0.5s ease, transform 0.5s ease;
        }

        @keyframes mengapung {
            0% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(25px, -40px) rotate(15deg); }
            66% { transform: translate(-20px, 15px) rotate(-15deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        .enzyme {
            width: 60px;
            height: 60px;
            background: #8e5cf7;
            border: 4px solid rgba(255,255,255,0.8);
            box-shadow: 0 4px 15px rgba(142,92,247,0.3);
        }

        .substrate {
            width: 25px;
            height: 25px;
            background: #ff9800;
            border: 3px solid rgba(255,255,255,0.8);
            box-shadow: 0 4px 10px rgba(255,152,0,0.3);
        }

        .product {
            width: 18px;
            height: 18px;
            background: #5ec85e;
            border: 2px solid white;
            box-shadow: 0 0 10px #5ec85e;
        }

        /* GELEMBUNG */
        .bubble {
            position: absolute;
            background: rgba(255,255,255,0.7);
            border: 1px solid white;
            border-radius: 50%;
            bottom: 0;
            animation: naikBubble 3s linear forwards;
            z-index: 4;
        }

        @keyframes naikBubble {
            from { transform: translateY(0) scale(1); opacity: 0.8; }
            to { transform: translateY(-450px) scale(1.8); opacity: 0; }
        }

        /* LEGEND */
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            font-size: 15px;
        }

        .dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            margin-right: 12px;
        }
        .purple { background: #8e5cf7; }
        .orange { background: #ff9800; }
        .green { background: #5ec85e; }

        .credit {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #888;
        }

        @media(max-width: 900px) {
            .layout { grid-template-columns: 1fr; }
            .beaker { max-width: 100%; }
        }
    </style>
</head>
<body>

<div class="simulasi-enzim" id="simulasiContainer">
    <div class="header">
        <h1>🧪 Simulasi Cara Kerja Enzim</h1>
        <p>Amati interaksi molekul berdasarkan suhu dan pH.</p>
        
        <!-- POSISI BARU: Tombol dipindah ke atas tengah -->
        <div class="top-action-box">
            <button class="btn fullscreen btn-top" id="btnFullscreen">🖥 Tampilkan Layar Penuh</button>
        </div>
    </div>

    <div class="layout">
        <!-- PANEL KIRI -->
        <div class="side-panel">
            <div class="panel">
                <h3>⚙ Kontrol</h3>
                <button class="btn enzim">➕ Tambah Enzim</button>
                <button class="btn substrat">➕ Tambah Substrat</button>
                <button class="btn mulai">▶ Mulai Reaksi</button>
                <button class="btn reset">↻ Reset</button>
            </div>
            
            <div class="panel">
                <h3>🌡 Pengaturan</h3>
                <p><b>Suhu:</b> <span id="suhuValue">37</span>°C</p>
                <input type="range" id="suhuSlider" min="0" max="100" value="37" style="width:100%;">
                
                <p style="margin-top:15px;"><b>pH:</b> <span id="phValue">7</span></p>
                <input type="range" id="phSlider" min="1" max="14" value="7" style="width:100%;">
            </div>
        </div>

        <!-- AREA TENGAH -->
        <div class="canvas-box">
            <div class="beaker" id="beaker">
                <div class="liquid" id="liquid"></div>
                <div class="scale scale1">400ml</div>
                <div class="scale scale2">300ml</div>
                <div class="scale scale3">200ml</div>
            </div>
        </div>

        <!-- PANEL KANAN -->
        <div class="side-panel">
            <div class="panel">
                <h3>ℹ Kondisi</h3>
                <p id="infoEnzim"><b>Enzim:</b> 0</p>
                <p id="infoSubstrat"><b>Substrat:</b> 0</p>
            </div>

            <div class="panel">
                <h3>🧬 Keterangan</h3>
                <div class="legend-item"><div class="dot purple"></div> Enzim (Biokatalis)</div>
                <div class="legend-item"><div class="dot orange"></div> Substrat</div>
                <div class="legend-item"><div class="dot green"></div> Produk</div>
            </div>
        </div>
    </div>
    
    <div class="credit">produced by Riyanti for Biologidaebak</div>
</div>

<script>
    let enzimCount = 0;
    let substratCount = 0;
    const beaker = document.getElementById("beaker");
    const suhuSlider = document.getElementById("suhuSlider");
    const phSlider = document.getElementById("phSlider");
    const simulasiContainer = document.getElementById("simulasiContainer");
    const btnFullscreen = document.getElementById("btnFullscreen");

    // LOGIKA FULLSCREEN
    btnFullscreen.addEventListener("click", () => {
        if (!document.fullscreenElement) {
            if (simulasiContainer.requestFullscreen) {
                simulasiContainer.requestFullscreen();
            } else if (simulasiContainer.webkitRequestFullscreen) { /* Safari */
                simulasiContainer.webkitRequestFullscreen();
            } else if (simulasiContainer.msRequestFullscreen) { /* IE11 */
                simulasiContainer.msRequestFullscreen();
            }
        } else {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        }
    });

    // Otomatis deteksi perubahan mode fullscreen
    document.addEventListener("fullscreenchange", () => {
        if (document.fullscreenElement) {
            btnFullscreen.innerText = "❌ Keluar Layar Penuh";
            btnFullscreen.style.background = "#e91e63";
            btnFullscreen.style.boxShadow = "0 4px 15px rgba(233, 30, 99, 0.3)";
        } else {
            btnFullscreen.innerText = "🖥 Tampilkan Layar Penuh";
            btnFullscreen.style.background = "#00bcd4";
            btnFullscreen.style.boxShadow = "0 4px 15px rgba(0, 188, 212, 0.3)";
        }
    });

    // Update Teks Panel Info
    function updateTeks() {
        document.getElementById("infoEnzim").innerHTML = "<b>Enzim:</b> " + enzimCount;
        document.getElementById("infoSubstrat").innerHTML = "<b>Substrat:</b> " + substratCount;
    }

    // Fungsi Membuat Animasi Mengapung yang Halus
    function beriAnimasiMengapung(el, tipe) {
        const durasi = tipe === 'enzyme' ? (6 + Math.random() * 4) : (4 + Math.random() * 3);
        const delay = Math.random() * -10;
        el.style.animation = `mengapung ${durasi}s ease-in-out ${delay}s infinite alternate`;
    }

    // Tambah Enzim
    document.querySelector(".enzim").addEventListener("click", () => {
        if(enzimCount >= 12) return alert("Cairan sudah penuh dengan enzim!");
        enzimCount++;
        updateTeks();
        const e = document.createElement("div");
        e.classList.add("molecule", "enzyme");
        e.style.top = (150 + Math.random() * 250) + "px";
        e.style.left = (10 + Math.random() * 70) + "%";
        beriAnimasiMengapung(e, 'enzyme');
        beaker.appendChild(e);
        cekKondisiLingkungan();
    });

    // Tambah Substrat
    document.querySelector(".substrat").addEventListener("click", () => {
        if(substratCount >= 25) return alert("Substrat terlalu jenuh!");
        substratCount++;
        updateTeks();
        const s = document.createElement("div");
        s.classList.add("molecule", "substrate");
        s.style.top = (150 + Math.random() * 250) + "px";
        s.style.left = (10 + Math.random() * 70) + "%";
        beriAnimasiMengapung(s, 'substrate');
        beaker.appendChild(s);
    });

    // Logika Suhu dan pH (Denaturasi)
    function cekKondisiLingkungan() {
        const suhu = Number(suhuSlider.value);
        const ph = Number(phSlider.value);
        document.getElementById("suhuValue").innerText = suhu;
        document.getElementById("phValue").innerText = ph;

        let activity = (suhu <= 37) ? (suhu / 37) : Math.max(0, 1 - (suhu - 37) / 25);
        if (ph < 5 || ph > 9) activity *= 0.4;

        document.querySelectorAll(".enzyme").forEach(e => {
            const speed = Math.max(0.5, 5 - activity * 4);
            e.style.animationDuration = speed + "s";

            if (activity > 0.7) {
                e.style.background = "#8e5cf7";
                e.style.filter = "blur(0px)";
                e.style.transform = "scale(1)";
            } else if (activity > 0.3) {
                e.style.background = "#c084fc";
                e.style.filter = "blur(0.5px)";
            } else {
                e.style.background = "#444"; 
                e.style.filter = "blur(2px)";
                e.style.transform = "scale(1.1) rotate(10deg)";
            }
        });
        return activity;
    }

    suhuSlider.addEventListener("input", cekKondisiLingkungan);
    phSlider.addEventListener("input", cekKondisiLingkungan);

    // Mulai Reaksi
    document.querySelector(".mulai").addEventListener("click", () => {
        const activity = cekKondisiLingkungan();
        if(activity < 0.3) return alert("Enzim rusak (denaturasi)! Turunkan suhu atau atur pH.");

        const enzymes = document.querySelectorAll(".enzyme");
        const substrates = document.querySelectorAll(".substrate");
        let limit = Math.min(enzymes.length, substrates.length);

        for(let i=0; i<limit; i++) {
            let s = substrates[i];
            let e = enzymes[i];

            s.style.animation = "none"; 
            s.style.left = e.style.left;
            s.style.top = e.style.top;

            setTimeout(() => {
                if(s.parentNode) {
                    s.remove();
                    substratCount--;
                    updateTeks();
                    
                    const p = document.createElement("div");
                    p.classList.add("molecule", "product");
                    p.style.left = e.style.left;
                    p.style.top = e.style.top;
                    beaker.appendChild(p);
                    
                    setTimeout(() => beriAnimasiMengapung(p, 'substrate'), 100);
                    if(Math.random() > 0.5) buatBubble();
                }
            }, 1500);
        }
    });

    function buatBubble() {
        const b = document.createElement("div");
        b.classList.add("bubble");
        const size = 10 + Math.random() * 15;
        b.style.width = size + "px";
        b.style.height = size + "px";
        b.style.left = (10 + Math.random() * 80) + "%";
        beaker.appendChild(b);
        setTimeout(() => b.remove(), 3000);
    }

    // Reset
    document.querySelector(".reset").addEventListener("click", () => {
        enzimCount = 0;
        substratCount = 0;
        updateTeks();
        document.querySelectorAll(".molecule").forEach(m => m.remove());
        document.querySelectorAll(".bubble").forEach(b => b.remove());
    });
</script>

</body>
</html>
